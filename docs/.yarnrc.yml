# Yarn 4 configuration.
# Corepack reads the `packageManager` field in package.json to pin the Yarn
# version. The dependency cache is not committed: CI restores it with
# actions/cache, and a fresh local clone populates it via `yarn install`.
nodeLinker: pnp

# Keep the cache inside the project so CI can cache it with actions/cache.
enableGlobalCache: false

# Relax PnP resolution for dependencies with imperfect peer/dep metadata.
pnpMode: loose
