# Yarn 4 — Zero-Install configuration.
# The dependency cache (.yarn/cache) is committed to the repo so a fresh
# clone can build without running `yarn install`. Corepack reads the
# `packageManager` field in package.json to pin the Yarn version.
nodeLinker: pnp

# Keep the cache inside the project so it can be committed (Zero-Install).
enableGlobalCache: false

# Relax PnP resolution for dependencies with imperfect peer/dep metadata.
pnpMode: loose

# Fetch platform binaries for every OS/CPU the project is built on, so the
# committed cache supports both local development (macOS) and the Linux CI
# runner without an online install.
supportedArchitectures:
  os:
    - darwin
    - linux
  cpu:
    - arm64
    - x64
  libc:
    - glibc
